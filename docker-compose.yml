services:
  user-agent:
    build: .
    ports:
      - "6847:3000"
    environment:
      - API_KEY=${API_KEY}
      - LLM_PROVIDER=claude-cli
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - PORT=3000
      - MAX_CONCURRENT_SESSIONS=2
    volumes:
      - reports:/app/tmp/reports
      - videos:/app/tmp/videos
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always

volumes:
  reports:
  videos:
